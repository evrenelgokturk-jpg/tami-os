<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAMI OS v1.0 - Cyber Shell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Share Tech Mono', monospace; }
        .cyber-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(16, 185, 129, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-zinc-950 text-emerald-400 min-h-screen overflow-hidden cyber-grid relative select-none">

    <div class="absolute inset-0 bg-radial-at-t from-emerald-500/10 via-transparent to-transparent pointer-events-none"></div>

    <header class="w-full border-b border-emerald-500/30 bg-zinc-900/80 backdrop-blur-md px-6 py-2 flex justify-between items-center text-xs tracking-widest z-50 relative">
        <div class="flex items-center gap-3">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
            <span class="font-bold text-white">TAMI_OS // CORE_READY</span>
        </div>
        <div id="liveClock" class="text-emerald-300 font-bold">00:00:00</div>
    </header>

    <main class="p-8 grid grid-cols-1 gap-6 w-32 relative z-10">
        
        <div onclick="openWindow('win-finance')" class="flex flex-col items-center justify-center p-3 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 cursor-pointer transition text-center group">
            <div class="text-3xl mb-1 group-hover:scale-110 transition">💰</div>
            <span class="text-[11px] font-bold tracking-wider text-zinc-300 group-hover:text-emerald-400">TAMI_FINANCE</span>
        </div>

        <div onclick="openWindow('win-wardrobe')" class="flex flex-col items-center justify-center p-3 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 cursor-pointer transition text-center group">
            <div class="text-3xl mb-1 group-hover:scale-110 transition">👕</div>
            <span class="text-[11px] font-bold tracking-wider text-zinc-300 group-hover:text-emerald-400">ZARA_WARDROBE</span>
        </div>

    </main>

    <div id="win-finance" class="hidden absolute top-1/4 left-1/4 w-[90%] sm:w-[450px] bg-zinc-900/95 border-2 border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.2)] rounded-lg overflow-hidden z-40">
        <div class="bg-emerald-950 border-b border-emerald-500 px-4 py-2 flex justify-between items-center cursor-move">
            <span class="text-xs font-bold text-emerald-300 tracking-wider">⚡ SYS_WINDOW: TAMI_FINANCE.EXE</span>
            <button onclick="closeWindow('win-finance')" class="text-sm font-bold text-emerald-400 hover:text-red-400 transition">✕</button>
        </div>
        <div class="p-4 h-64 bg-zinc-950/90 overflow-y-auto">
            <iframe src="https://gokturk-k.github.io/tami-asistan/" class="w-full h-full border-0 rounded-md"></iframe>
        </div>
    </div>

    <div id="win-wardrobe" class="hidden absolute top-1/3 left-1/3 w-[90%] sm:w-[500px] bg-zinc-900/95 border-2 border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.2)] rounded-lg overflow-hidden z-40">
        <div class="bg-emerald-950 border-b border-emerald-500 px-4 py-2 flex justify-between items-center cursor-move">
            <span class="text-xs font-bold text-emerald-300 tracking-wider">⚡ SYS_WINDOW: ZARA_WARDROBE.EXE</span>
            <button onclick="closeWindow('win-wardrobe')" class="text-sm font-bold text-emerald-400 hover:text-red-400 transition">✕</button>
        </div>
        <div class="p-4 h-96 bg-zinc-950/90 overflow-y-auto">
            <iframe src="https://gokturk-k.github.io/akilli-gardirob/" class="w-full h-full border-0 rounded-md"></iframe>
        </div>
    </div>

    <footer class="absolute bottom-0 w-full border-t border-emerald-500/20 bg-zinc-950/90 text-[10px] px-6 py-1 flex justify-between items-center text-zinc-500">
        <span>CPU_LOAD: 12% // MEMORY: 2.4GB / 16GB</span>
        <span>DESIGNED BY TAMI // SECURE_SHELL</span>
    </footer>

    <script>
        // Canlı Saat Motoru
        function updateClock() {
            const now = new Date();
            const timeString = now.toTimeString().split(' ')[0];
            document.getElementById('liveClock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Pencere Açma Fonksiyonu
        function openWindow(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        // Pencere Kapatma Fonksiyonu
        function closeWindow(id) {
            document.getElementById(id).classList.add('hidden');
        }
    </script>
</body>
</html>
