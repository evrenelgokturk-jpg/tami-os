<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAMI OS v1.4 - Unstoppable Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Share Tech Mono', monospace; }
        .cyber-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(16, 185, 129, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
        }
        .window-active { z-index: 50 !important; border-color: #34d399 !important; }
        
        /* Boyutlandırma Köşesi */
        .resizer {
            width: 15px;
            height: 15px;
            background: rgba(16, 185, 129, 0.3);
            position: absolute;
            right: 0;
            bottom: 0;
            cursor: se-resize;
            border-radius: 4px 0 0 0;
        }
    </style>
</head>
<body class="bg-zinc-950 text-emerald-400 min-h-screen overflow-hidden cyber-grid relative select-none">

    <div class="absolute inset-0 bg-radial-at-t from-emerald-500/10 via-transparent to-transparent pointer-events-none"></div>

    <header class="w-full border-b border-emerald-500/30 bg-zinc-900/80 backdrop-blur-md px-6 py-2 flex justify-between items-center text-xs tracking-widest z-[100] relative">
        <div class="flex items-center gap-3">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
            <span class="font-bold text-white">TAMI_OS // UNSTOPPABLE_v1.4</span>
        </div>
        <div class="text-[10px] text-zinc-500 hidden sm:block">⚙️ TAM EKRAN: 'F' // TUT SÜRÜKLE VE SAĞ ALTTAN BÜYÜT KANKA</div>
        <div id="liveClock" class="text-emerald-300 font-bold">00:00:00</div>
    </header>

    <main class="p-6 grid grid-cols-1 gap-4 w-32 relative z-10">
        <div onclick="openWindow('win-finance')" class="flex flex-col items-center justify-center p-3 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 cursor-pointer transition text-center group">
            <div class="text-3xl mb-1 group-hover:scale-110 transition">💰</div>
            <span class="text-[11px] font-bold tracking-wider text-zinc-300 group-hover:text-emerald-400">TAMI_FINANCE</span>
        </div>

        <div onclick="openWindow('win-wardrobe')" class="flex flex-col items-center justify-center p-3 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 cursor-pointer transition text-center group">
            <div class="text-3xl mb-1 group-hover:scale-110 transition">👕</div>
            <span class="text-[11px] font-bold tracking-wider text-zinc-300 group-hover:text-emerald-400">ZARA_WARDROBE</span>
        </div>
    </main>

    <div id="win-finance" onmousedown="focusWindow('win-finance')" class="hidden absolute top-20 left-10 w-[90%] sm:w-[450px] h-[400px] bg-zinc-900/95 border border-emerald-500/30 shadow-2xl rounded-lg flex flex-col z-40">
        <div class="window-header bg-zinc-900 border-b border-emerald-500/30 px-4 py-2 flex justify-between items-center cursor-move select-none shrink-0">
            <span class="text-xs font-bold text-emerald-400 tracking-wider">⚡ TAMI_FINANCE.EXE</span>
            <button onclick="closeWindow('win-finance')" class="text-sm font-bold text-zinc-500 hover:text-red-400 transition">✕</button>
        </div>
        <div class="w-full flex-1 bg-zinc-950 relative overflow-hidden iframe-container">
            <iframe id="iframe-finance" src="" class="w-full h-full border-0"></iframe>
        </div>
        <div class="resizer"></div>
    </div>

    <div id="win-wardrobe" onmousedown="focusWindow('win-wardrobe')" class="hidden absolute top-32 left-20 w-[90%] sm:w-[500px] h-[480px] bg-zinc-900/95 border border-emerald-500/30 shadow-2xl rounded-lg flex flex-col z-40">
        <div class="window-header bg-zinc-900 border-b border-emerald-500/30 px-4 py-2 flex justify-between items-center cursor-move select-none shrink-0">
            <span class="text-xs font-bold text-emerald-400 tracking-wider">⚡ ZARA_WARDROBE.EXE</span>
            <button onclick="closeWindow('win-wardrobe')" class="text-sm font-bold text-zinc-500 hover:text-red-400 transition">✕</button>
        </div>
        <div class="w-full flex-1 bg-zinc-950 relative overflow-hidden iframe-container">
            <iframe id="iframe-wardrobe" src="" class="w-full h-full border-0"></iframe>
        </div>
        <div class="resizer"></div>
    </div>

    <footer class="absolute bottom-0 w-full border-t border-emerald-500/20 bg-zinc-950/90 text-[10px] px-6 py-1 flex justify-between items-center text-zinc-500 z-[100]">
        <span>CPU_LOAD: 5% // SAF_JS_ENGINE // NO_BUGS</span>
        <span>DESIGNED BY TAMI // SYSTEM_SHELL</span>
    </footer>

    <script>
        // --- 🚨 KANKA LİNKLER SİYAH EKRAN VERİRSE BURAYI KONTROL ET 🚨 ---
        const FINANCE_URL = "https://gokturk-k.github.io/tami-asistan/";
        const WARDROBE_URL = "https://gokturk-k.github.io/akilli-gardirob/";

        function updateClock() {
            document.getElementById('liveClock').textContent = new Date().toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000); updateClock();

        function openWindow(id) {
            const win = document.getElementById(id);
            win.classList.remove('hidden');
            focusWindow(id);

            if(id === 'win-finance' && !document.getElementById('iframe-finance').src) {
                document.getElementById('iframe-finance').src = FINANCE_URL;
            }
            if(id === 'win-wardrobe' && !document.getElementById('iframe-wardrobe').src) {
                document.getElementById('iframe-wardrobe').src = WARDROBE_URL;
            }
        }

        function closeWindow(id) { document.getElementById(id).classList.add('hidden'); }

        function focusWindow(id) {
            document.getElementById('win-finance').classList.remove('window-active');
            document.getElementById('win-wardrobe').classList.remove('window-active');
            document.getElementById(id).classList.add('window-active');
        }

        // --- SAF JAVASCRIPT KURŞUN GEÇİRMEZ SÜRÜKLEME VE BÜYÜTME MOTORU ---
        document.querySelectorAll('[id^="win-"]').forEach(win => {
            const header = win.querySelector('.window-header');
            const resizer = win.querySelector('.resizer');
            const iframe = win.querySelector('iframe');
            
            let isDragging = false;
            let isResizing = false;
            let startX, startY, startWidth, startHeight, startLeft, startTop;

            // --- SÜRÜKLEME ---
            header.addEventListener('mousedown', (e) => {
                isDragging = true;
                iframe.style.pointerEvents = 'none'; // İframe'i kilitle ki fareyi yutmasın!
                focusWindow(win.id);
                
                startX = e.clientX;
                startY = e.clientY;
                startLeft = win.offsetLeft;
                startTop = win.offsetTop;
                
                e.preventDefault();
            });

            // --- BÜYÜTME ---
            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                iframe.style.pointerEvents = 'none'; // İframe'i kilitle!
                focusWindow(win.id);
                
                startX = e.clientX;
                startY = e.clientY;
                startWidth = win.offsetWidth;
                startHeight = win.offsetHeight;
                
                e.preventDefault();
            });

            // --- FARE HAREKETİ (ORTAK) ---
            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    let deltaX = e.clientX - startX;
                    let deltaY = e.clientY - startY;
                    win.style.left = (startLeft + deltaX) + 'px';
                    win.style.top = (startTop + deltaY) + 'px';
                }
                
                if (isResizing) {
                    let deltaX = e.clientX - startX;
                    let deltaY = e.clientY - startY;
                    win.style.width = Math.max(320, startWidth + deltaX) + 'px';
                    win.style.height = Math.max(250, startHeight + deltaY) + 'px';
                }
            });

            // --- FAREYİ BIRAKMA (ORTAK) ---
            document.addEventListener('mouseup', () => {
                isDragging = false;
                isResizing = false;
                iframe.style.pointerEvents = 'auto'; // İframe'i tekrar serbest bırak
            });
        });

        // --- F TUŞU TAM EKRAN ---
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
